    resources:
    - name: openai-deployments-deployment-id-embeddings
      path: /openai/deployments/{deployment-id}/embeddings
      operations:
      - name: createembedding
        method: POST
        description: AOAI Create embeddings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
