apis:
- name: Azure OpenAI Service API
  description: Azure OpenAI Service provides REST API access to OpenAI large language models including GPT-4, GPT-4o, GPT-3.5
    Turbo, DALL-E, and Whisper with enterprise-grade security and compliance. It supports chat completions, text generation,
    embeddings, image generation, audio transcription, and fine-tuning with Azure Active Directory authentication and private
    networking.
