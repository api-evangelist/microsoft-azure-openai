      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                temperature:
                  type: number
      responses:
        '200':
          description: Chat completion
          content:
            application/json:
              schema:
